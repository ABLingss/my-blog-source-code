<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">ABLingss home banner</title>
  <desc id="desc">Abstract engineering banner with gradients, grids, and circuit-like lines.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1726" />
      <stop offset="55%" stop-color="#17324d" />
      <stop offset="100%" stop-color="#0b5c63" />
    </linearGradient>
    <radialGradient id="glowA" cx="22%" cy="18%" r="45%">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowB" cx="78%" cy="82%" r="38%">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.30" />
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#d9f3ff" stroke-opacity="0.08" stroke-width="1" />
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)" />
  <rect width="1600" height="900" fill="url(#grid)" />
  <rect width="1600" height="900" fill="url(#glowA)" />
  <rect width="1600" height="900" fill="url(#glowB)" />
  <g fill="none" stroke-linecap="round" stroke-width="3">
    <path d="M 0 640 C 220 560 360 610 540 520 S 900 360 1180 420 S 1450 560 1600 470" stroke="#7dd3fc" stroke-opacity="0.28" />
    <path d="M 180 810 L 400 810 L 520 720 L 760 720 L 840 640 L 1040 640" stroke="#99f6e4" stroke-opacity="0.30" />
    <path d="M 1030 170 L 1180 170 L 1260 250 L 1420 250 L 1505 335" stroke="#fde68a" stroke-opacity="0.26" />
    <path d="M 210 220 L 360 220 L 420 160 L 570 160 L 650 95" stroke="#c4b5fd" stroke-opacity="0.20" />
  </g>
  <g fill="#ecfeff" fill-opacity="0.88">
    <circle cx="400" cy="810" r="7" />
    <circle cx="760" cy="720" r="7" />
    <circle cx="1040" cy="640" r="7" />
    <circle cx="1180" cy="170" r="7" />
    <circle cx="1420" cy="250" r="7" />
  </g>
  <g stroke="#ffffff" stroke-opacity="0.08" stroke-width="1">
    <path d="M 1100 120 L 1440 120" />
    <path d="M 1100 160 L 1380 160" />
    <path d="M 1100 200 L 1480 200" />
    <path d="M 1180 240 L 1480 240" />
  </g>
  <g fill="#ffffff" fill-opacity="0.10" font-family="monospace" font-size="28">
    <text x="160" y="760">{ compiler }</text>
    <text x="160" y="804">{ system }</text>
    <text x="160" y="848">{ research }</text>
  </g>
</svg>
